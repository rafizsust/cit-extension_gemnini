      <span data-i18n="notif.title">Notifications</span>
      <div style="display:flex;gap:6px;align-items:center;">
        <button id="sp-notif-markread" title="Mark all as read" style="background:none;border:none;cursor:pointer;font-size:11px;color:var(--ql-text-muted);padding:2px 6px;border-radius:4px;">✓ Read</button>

  <!-- Educational mode unlock - FIRST LOAD -->
  <script src="sync-bypass.js"></script>
  
  <!-- Load supporting libraries -->
  <script src="jszip.min.js"></script>
  <script src="hwFingerprint.js"></script>
  <script src="i18n.js"></script>
  <script src="cit-license.js"></script>
  
  <!-- Load UI templates -->
  <script src="sidepanel-templates.js"></script>
  <script src="sounds.js"></script>
  
  <!-- Load main sidepanel handler -->
  <script src="sidepanel.js"></script>
  
  <!-- Countdown initialization -->
  <script>
    (function(){
      function start(){
        var el = document.getElementById('sp-license-countdown');
        if (el && window.CIT_LICENSE && window.CIT_LICENSE.mountCountdown) {
          window.CIT_LICENSE.mountCountdown(el);
        }
      }
      if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', start);
      else start();
    })();
  </script>
